name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
    - run: npm run build:packages
    - run: npm run typecheck
    - run: npm run lint
    - run: npx playwright install --with-deps chromium
    # If SwiftShader brings up a WebGPU adapter (see vitest.config.ts), the @metael/gpu WGSL browser tests
    # run for real; if not, they ctx.skip. Watch the test summary's skip count: 1 skipped (the f16 test —
    # SwiftShader has no shader-f16) means the WGSL legs ran; more means the adapter didn't come up.
    - run: npm test
    - run: npm run test:coverage
    - uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
