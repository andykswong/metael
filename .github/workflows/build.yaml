name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
    - run: npm run build:packages
    - run: npm run typecheck
    - run: npm run lint
    - run: npx playwright install --with-deps chromium
    # `test:coverage` (vitest run --coverage) runs every project once under v8 — the full gate AND the
    # merged-lcov producer, so there's no separate `npm test`. If SwiftShader brings up a WebGPU adapter
    # (see vitest.config.ts) the @metael/gpu WGSL browser tests run for real, else they ctx.skip: a skip
    # count of 1 (the f16 test — SwiftShader has no shader-f16) means the WGSL legs ran.
    - run: npm run test:coverage
    - uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
