# Codecov config for the metael monorepo. Coverage is produced by `vitest --coverage` (v8 → lcov) over
# the publishable package sources; see vitest.config.ts. The @metael/* packages are broken out as components.
comment:
  layout: "header, diff, flags, components"
component_management:
  individual_components:
    - component_id: "@metael/lang"
      paths:
        - "packages/lang/src/**"
    - component_id: "@metael/math"
      paths:
        - "packages/math/src/**"
    - component_id: "@metael/std"
      paths:
        - "packages/std/src/**"
    - component_id: "@metael/runtime"
      paths:
        - "packages/runtime/src/**"
    - component_id: "@metael/vdom"
      paths:
        - "packages/vdom/src/**"
    - component_id: "@metael/gpu"
      paths:
        - "packages/gpu/src/**"
    - component_id: "@metael/lsp"
      paths:
        - "packages/lsp/src/**"
coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: true
ignore:
  - "apps/**"
  - "**/*.test.ts"
  - "**/*.browser.test.ts"
  - "packages/*/src/test/**"
